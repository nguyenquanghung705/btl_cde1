<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g opacity="0.08" fill="#fff">
    <circle cx="80" cy="60" r="40"/>
    <circle cx="540" cy="340" r="60"/>
    <circle cx="500" cy="80" r="25"/>
  </g>
  <!-- Laptop body -->
  <g transform="translate(120,120)">
    <rect x="0" y="0" width="360" height="220" rx="14" fill="#1a1a1a" stroke="#fff" stroke-width="2"/>
    <rect x="14" y="14" width="332" height="192" rx="6" fill="url(#screen)"/>
    <text x="180" y="110" text-anchor="middle" font-family="Segoe UI, Arial" font-weight="700" font-size="28" fill="#fff">MSI Katana 15</text>
    <text x="180" y="142" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#bbb">RTX 4060 • Gaming</text>
    <text x="180" y="180" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#C8102E" letter-spacing="4">L A P T O P   S H O P</text>
  </g>
  <!-- Laptop base -->
  <polygon points="90,340 510,340 540,360 60,360" fill="#2a2a2a"/>
  <rect x="240" y="340" width="120" height="4" fill="#555"/>
</svg>